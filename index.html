<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glutena</title>
    <style>
        /* Calculator modal and form styling to match others */
        #calculatorModal .modal-content {
            background: #fff;
            border-radius: 1.2rem;
            padding: 2rem 1.5rem 2.5rem 1.5rem;
            max-width: 95vw;
            width: 350px;
            position: relative;
        }

        #calculatorModal h2 {
            color: #4a7c59;
            font-size: 1.3rem;
            text-align: center;
            margin-top: 0;
        }

        #calculatorForm {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
            align-items: center;
        }

        #calcDisplay {
            width: 220px;
            font-size: 1.15rem;
            text-align: right;
            padding: 0.5rem;
            border-radius: 0.5rem;
            border: 1px solid #6ab187;
            background: #ffffff;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .calc-btn {
            background: #eaf6ee;
            color: #4a7c59;
            border: none;
            border-radius: 0.5rem;
            padding: 0.7rem;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .calc-btn:hover {
            background: #6ab187;
            color: #fff;
        }

        .calc-btn[data-value="="] {
            background: #4a7c59;
            color: #fff;
            grid-column: span 4;
        }

        .calc-btn[data-value="="]:hover {
            background: #388e5c;
        }

        @media (min-width: 800px) {
            #calculatorModal .modal-content {
                width: 500px;
                min-width: 400px;
            }
        }

        @media (max-width: 400px) {
            #calculatorModal .modal-content {
                padding: 1rem 0.5rem 1rem 0.5rem;
                width: 98vw;
            }

            #calcDisplay {
                width: 98vw;
            }
        }

        /* Right sidebar (heart menu) styles */
        .right-sidebar-menu {
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            width: 75vw;
            max-width: 320px;
            min-width: 220px;
            background: #fff;
            /* box-shadow removed */
            z-index: 2100;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(.4, 0, .2, 1);
            display: flex;
            flex-direction: column;
            padding-top: 0;
        }

        .right-sidebar-menu.show {
            transform: translateX(0);
        }

        .right-sidebar-header {
            display: flex;
            align-items: center;
            padding: 1.2rem 1.2rem 0.5rem 1.2rem;
            border-bottom: 1px solid #eee;
        }

        .right-sidebar-menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.5rem;
        }

        .right-sidebar-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.18);
            z-index: 2000;
        }

        .right-sidebar-backdrop.show {
            display: block;
        }

        @media (max-width: 600px) {
            .right-sidebar-menu {
                width: 90vw;
                min-width: 0;
                max-width: 98vw;
            }
        }

        html {
            box-sizing: border-box;
            font-size: 16px;
        }

        *,
        *:before,
        *:after {
            box-sizing: inherit;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f8f8f8;
            margin: 0;
            padding: 0;
        }

        header {
            background: #6ab187;
            color: white;
            padding: 2.0vw 0 2vw 0;
            text-align: center;
            position: relative;
        }

        .header-icon {
            position: absolute;
            top: 1.5vw;
            width: 8vw;
            max-width: 40px;
            min-width: 28px;
            height: 8vw;
            max-height: 40px;
            min-height: 28px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .menu-icon {
            left: 2vw;
        }

        .heart-icon {
            right: 2vw;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0.5rem 0 1.2rem 0;
        }

        header p {
            font-size: 1.1rem;
            margin: 0 0 0.5rem 0;
        }

        .container {
            max-width: 800px;
            width: 92vw;
            margin: 4vw auto;
            background: white;
            padding: 5vw 2vw;
            border-radius: 1vw;
            /* box-shadow removed */
        }

        #searchBar {
            width: 100%;
            padding: 1vw 0.5vw;
            font-size: 0.95rem;
            border: 1px solid #6ab187;
            border-radius: 0.7vw;
            margin-bottom: 4vw;
        }

        .recipe-list {
            list-style: none;
            padding: 0;
        }

        .recipe-item {
            padding: 3vw 0;
            border-bottom: 1px solid #eee;
        }

        .recipe-item:last-child {
            border-bottom: none;
        }

        .recipe-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #4a7c59;
        }

        .recipe-desc {
            color: #555;
            margin-top: 0.5rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.6rem;
            }

            .container {
                padding: 6vw 2vw;
            }

            #searchBar {
                font-size: 0.85rem;
                padding: 1.7vw 1.3vw;
            }

            .header-icon {
                min-width: 24px;
                min-height: 24px;
                max-width: 32px;
                max-height: 32px;
            }
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 1.1rem;
            }

            .container {
                padding: 4vw 1vw;
            }
        }
    </style>
    <!-- Firebase scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        /* Modal styles for converter */
        .modal-converter {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            overflow: auto;
            background: rgba(0, 0, 0, 0.25);
            align-items: center;
            justify-content: center;
        }

        .modal-converter.show {
            display: flex;
        }

        .modal-content {
            background: #fff;
            margin: auto;
            border-radius: 1.2rem;
            padding: 2rem 1.5rem 1.2rem 1.5rem;
            max-width: 95vw;
            width: 350px;
            /* box-shadow removed */
            position: relative;
        }

        @media (min-width: 800px) {
            .modal-content {
                width: 500px;
                min-width: 400px;
            }
        }

        .modal-close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #4a7c59;
            cursor: pointer;
        }

        .modal-content h2 {
            margin-top: 0;
            color: #4a7c59;
            font-size: 1.3rem;
            text-align: center;
        }

        .converter-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .converter-form input,
        .converter-form select {
            padding: 0.5rem;
            font-size: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #6ab187;
        }

        .converter-form button {
            background: #6ab187;
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            padding: 0.7rem;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .converter-result {
            text-align: center;
            margin-top: 0.5rem;
            color: #333;
            font-weight: bold;
        }

        @media (max-width: 400px) {
            .modal-content {
                padding: 1rem 0.5rem 1rem 0.5rem;
                width: 98vw;
            }
        }
    </style>
    <style>
        /* Sidebar menu styles */
        .sidebar-menu {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 75vw;
            max-width: 320px;
            min-width: 220px;
            background: #fff;
            /* box-shadow removed */
            z-index: 2000;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(.4, 0, .2, 1);
            display: flex;
            flex-direction: column;
            padding-top: 0;
        }

        .sidebar-menu.show {
            transform: translateX(0);
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            padding: 1.2rem 1.2rem 0.5rem 1.2rem;
            border-bottom: 1px solid #eee;
        }

        .sidebar-menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.5rem;
        }

        .sidebar-menu-list {
            display: flex;
            flex-direction: column;
            padding: 1rem 0;
        }

        .sidebar-menu-list button {
            width: 100%;
            background: none;
            border: none;
            padding: 1rem 1.5rem;
            text-align: left;
            font-size: 1.1rem;
            color: #333;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-menu-list button:hover {
            background: #f0f0f0;
        }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.18);
            z-index: 1500;
        }

        .sidebar-backdrop.show {
            display: block;
        }

        @media (max-width: 600px) {
            .sidebar-menu {
                width: 90vw;
                min-width: 0;
                max-width: 98vw;
            }
        }
    </style>
</head>

<body>
    <!-- Timer Modal -->
    <!-- Notes Modal -->
    <div class="modal-converter" id="notesModal">
        <div class="modal-content" style="padding:2rem 1.5rem 2.5rem 1.5rem;">
            <button class="modal-close-btn" id="closeNotesModal" aria-label="Close notes">&times;</button>
            <h2>Notes</h2>
            <textarea id="notesTextarea" rows="8"
                style="width:100%;border-radius:0.5rem;border:1px solid #6ab187;padding:1.2rem 1rem 1.5rem 1rem;font-size:1rem;font-family:inherit;resize:vertical;"
                placeholder=""></textarea>
            <div style="display: flex; flex-direction: column; align-items: center; width: 100%; gap: 0.5rem;">
                <button id="saveNotesBtn"
                    style="background:#6ab187;color:#fff;border:none;border-radius:0.5rem;padding:0.7rem;font-size:1rem;margin-top:1.2rem;cursor:pointer;width:100%;">Save
                </button>
                <button id="eraseNotesBtn"
                    style="background:#e57373;color:#fff;border:none;border-radius:0.5rem;padding:0.7rem;font-size:1rem;cursor:pointer;width:100%;">Erase
                </button>
                <div id="notesSavedMsg"
                    style="color:#6ab187;text-align:center;margin-top:0.5rem;font-size:1rem;display:none;">Notes saved!
                </div>
            </div>
        </div>
    </div>
    <!-- Calculator Modal -->
    <div class="modal-converter" id="calculatorModal">
        <div class="modal-content">
            <button class="modal-close-btn" id="closeCalculatorModal" aria-label="Close calculator">&times;</button>
            <h2>Calculator</h2>
            <form id="calculatorForm" style="display:flex;flex-direction:column;gap:1rem;align-items:center;">
                <input type="text" id="calcDisplay" readonly
                    style="width:220px;font-size:1.3rem;text-align:right;padding:0.5rem;border-radius:0.5rem;border:1px solid #6ab187;" />
                <div
                    style="display:grid;grid-template-columns:repeat(4,50px);gap:0.5rem;margin-left:auto;margin-right:auto;">
                    <button type="button" class="calc-btn" data-value="7">7</button>
                    <button type="button" class="calc-btn" data-value="8">8</button>
                    <button type="button" class="calc-btn" data-value="9">9</button>
                    <button type="button" class="calc-btn" data-value="/">÷</button>
                    <button type="button" class="calc-btn" data-value="4">4</button>
                    <button type="button" class="calc-btn" data-value="5">5</button>
                    <button type="button" class="calc-btn" data-value="6">6</button>
                    <button type="button" class="calc-btn" data-value="*">×</button>
                    <button type="button" class="calc-btn" data-value="1">1</button>
                    <button type="button" class="calc-btn" data-value="2">2</button>
                    <button type="button" class="calc-btn" data-value="3">3</button>
                    <button type="button" class="calc-btn" data-value="-">−</button>
                    <button type="button" class="calc-btn" data-value="0">0</button>
                    <button type="button" class="calc-btn" data-value=".">.</button>
                    <button type="button" class="calc-btn" data-value="C">C</button>
                    <button type="button" class="calc-btn" data-value="+">+</button>
                    <button type="button" class="calc-btn" data-value="="
                        style="grid-column:span 4;background:#6ab187;color:#fff;margin-top:1rem;">=</button>
                </div>
            </form>
        </div>
    </div>
    <div class="modal-converter" id="timerModal">
        <div class="modal-content">
            <button class="modal-close-btn" id="closeTimerModal" aria-label="Close timer">&times;</button>
            <h2>Oven Baking Timer</h2>
            <form id="timerForm" style="display:flex;flex-direction:column;gap:1rem;align-items:center;">
                <label for="timerMinutes" style="font-size:1.1rem;color:#888;">Set timer (minutes):</label>
                <input type="number" id="timerMinutes" min="1" max="240" step="1" required
                    style="font-size:1.1rem;padding:0.5rem;border-radius:0.5rem;border:1px solid #6ab187;width:135px;text-align:center;">
                <button type="submit"
                    style="background:#6ab187;color:#fff;border:none;padding:0.7rem 1.7rem;border-radius:0.5rem;font-size:1rem;cursor:pointer;">Start
                    Timer</button>
                <button type="button" id="pauseTimerBtn"
                    style="background:#ffcd4d;color:#fff;border:none;padding:0.7rem 1.4rem;border-radius:0.5rem;font-size:1rem;cursor:pointer;">Pause
                    Timer</button>
                <button type="button" id="resetTimerBtn"
                    style="background:#e57373;color:#fff;border:none;padding:0.7rem 1.5rem;border-radius:0.5rem;font-size:1rem;cursor:pointer;">Reset
                    Timer</button>
            </form>
            <div id="timerDisplay" style="text-align:center;font-size:1.3rem;color:#4a7c59;margin-top:1rem;"></div>
        </div>
    </div>
    <!-- Baking Measurement Converter Modal -->
    <div class="modal-converter" id="converterModal">
        <div class="modal-content">
            <button class="modal-close-btn" id="closeConverterModal" aria-label="Close converter">&times;</button>
            <h2>Baking Measurement Converter</h2>
            <form class="converter-form" id="converterForm" autocomplete="off">
                <input type="number" id="convertValue" placeholder="Enter value" min="0" step="any" required>
                <select id="convertFrom">
                    <option value="cups">Cups</option>
                    <option value="tablespoons">Tablespoons</option>
                    <option value="teaspoons">Teaspoons</option>
                    <option value="grams">Grams</option>
                    <option value="ounces">Ounces</option>
                    <option value="milliliters">Milliliters</option>
                </select>
                <span style="text-align:center;">to</span>
                <select id="convertTo">
                    <option value="cups">Cups</option>
                    <option value="tablespoons">Tablespoons</option>
                    <option value="teaspoons">Teaspoons</option>
                    <option value="grams">Grams</option>
                    <option value="ounces">Ounces</option>
                    <option value="milliliters">Milliliters</option>
                </select>
                <button type="submit">Convert</button>
                <div class="converter-result" id="converterResult"></div>
            </form>
        </div>
    </div>
    <header>
        <button class="header-icon menu-icon" id="menuBtn" aria-label="Menu" type="button">
            <!-- White Hamburger menu SVG -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect y="4" width="24" height="3" rx="1.5" fill="white" />
                <rect y="10.5" width="24" height="3" rx="1.5" fill="white" />
                <rect y="17" width="24" height="3" rx="1.5" fill="white" />
            </svg>
        </button>
        <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
        <nav class="sidebar-menu" id="sidebarMenu" aria-label="Sidebar menu">
            <div class="sidebar-header">
                <button class="sidebar-menu-btn" id="closeSidebarBtn" aria-label="Close menu" type="button">
                    <!-- Green Hamburger menu SVG (sidebar only) -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect y="4" width="24" height="3" rx="1.5" fill="#4a7c59" />
                        <rect y="10.5" width="24" height="3" rx="1.5" fill="#4a7c59" />
                        <rect y="17" width="24" height="3" rx="1.5" fill="#4a7c59" />
                    </svg>
                </button>
                <span class="sidebar-header-title" style="color:#4a7c59;font-weight:bold;">Menu</span>
            </div>
            <div class="sidebar-menu-list">
                <!-- Home button removed -->
                <button type="button" id="openSearchBtn">
                    <!-- Search icon SVG -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                        style="vertical-align:middle;margin-right:8px;">
                        <circle cx="11" cy="11" r="8" stroke="#4a7c59" stroke-width="2" fill="none" />
                        <line x1="18" y1="18" x2="22" y2="22" stroke="#4a7c59" stroke-width="2" />
                    </svg>
                    Search
                </button>
                <button type="button" id="openTimerBtn">
                    <!-- Timer icon SVG -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                        style="vertical-align:middle;margin-right:8px;">
                        <circle cx="12" cy="12" r="9" stroke="#4a7c59" stroke-width="2" fill="none" />
                        <rect x="11" y="6" width="2" height="7" rx="1" fill="#4a7c59" />
                        <circle cx="12" cy="12" r="1.5" fill="#4a7c59" />
                    </svg>
                    Timer
                </button>
                <button type="button" id="openConverterBtn">
                    <!-- Swap icon: two crossing arrows -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                        style="vertical-align:middle;margin-right:8px;">
                        <path d="M4 7h12l-3-3" stroke="#4a7c59" stroke-width="2" fill="none" />
                        <path d="M20 17H8l3 3" stroke="#4a7c59" stroke-width="2" fill="none" />
                    </svg>
                    Convert
                </button>
                <button type="button" id="openCalculatorBtn">
                    <!-- Calculator icon SVG -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                        style="vertical-align:middle;margin-right:8px;">
                        <rect x="4" y="3" width="16" height="18" rx="2" stroke="#4a7c59" stroke-width="2" fill="none" />
                        <rect x="7" y="6" width="10" height="3" rx="1" fill="#4a7c59" />
                        <rect x="7" y="11" width="3" height="3" rx="1" fill="#4a7c59" />
                        <rect x="11" y="11" width="3" height="3" rx="1" fill="#4a7c59" />
                        <rect x="15" y="11" width="3" height="3" rx="1" fill="#4a7c59" />
                        <rect x="7" y="15" width="3" height="3" rx="1" fill="#4a7c59" />
                        <rect x="11" y="15" width="3" height="3" rx="1" fill="#4a7c59" />
                        <rect x="15" y="15" width="3" height="3" rx="1" fill="#4a7c59" />
                    </svg>
                    Calculator
                </button>
                <button type="button" id="openNotesBtn">
                    <!-- Notes icon SVG (notepad) -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                        style="vertical-align:middle;margin-right:8px;">
                        <rect x="4" y="4" width="16" height="16" rx="2" stroke="#4a7c59" stroke-width="2" fill="none" />
                        <line x1="8" y1="8" x2="16" y2="8" stroke="#4a7c59" stroke-width="2" />
                        <line x1="8" y1="12" x2="16" y2="12" stroke="#4a7c59" stroke-width="2" />
                        <line x1="8" y1="16" x2="14" y2="16" stroke="#4a7c59" stroke-width="2" />
                    </svg>
                    Notes
                </button>
                <button type="button" id="openFavoritesDropdownBtn">
                    <!-- Hollow Heart icon SVG -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                        style="vertical-align:middle;margin-right:8px;">
                        <path
                            d="M12 21s-6.2-5.2-8.4-8.1C1.2 10.1 2.1 7 5 6.2c1.7-.5 3.4.3 4.4 1.7C10.9 9.1 11.5 9 12 9s1.1.1 2.6-1.1c1-1.4 2.7-2.2 4.4-1.7 2.9.8 3.8 3.9 1.4 6.7C18.2 15.8 12 21 12 21z"
                            stroke="#4a7c59" stroke-width="2.0" fill="none" />
                    </svg>
                    Favorites
                </button>
                <button type="button" id="openProfileBtn">
                    <!-- User icon SVG -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                        style="vertical-align:middle;margin-right:8px;">
                        <circle cx="12" cy="8" r="4" stroke="#4a7c59" stroke-width="2" fill="none" />
                        <rect x="4" y="16" width="16" height="4" rx="2" stroke="#4a7c59" stroke-width="2" fill="none" />
                    </svg>
                    Profile
                </button>
            </div>
        </nav>
        <button class="header-icon heart-icon" aria-label="Favorites" id="openHeartMenu">
            <!-- Heart SVG -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path

                        <button type="submit"

                        style="background:#e57373;color:#fff;border:none;padding:0.6rem 1rem;border-radius:0.5rem;font-size:1rem;cursor:pointer;width:auto;margin-top:1rem;margin-bottom:2.0rem;box-shadow:0 2px 8px rgba(106,177,135,0.15);">Reset

            <button id="logoutBtn"
                style="background:#e57373;color:#fff;border:none;padding:0.7rem 1.5rem;border-radius:0.5rem;font-size:1rem;cursor:pointer;margin-top:0.4rem;margin-bottom:2.2rem;">Logout</button>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // ...existing code...
            // Profile/account logic
            const profileContainer = document.getElementById('profileContainer');
            const authForms = document.getElementById('authForms');
            const registerForm = document.getElementById('registerForm');
            const registerEmail = document.getElementById('registerEmail');
            const registerPassword = document.getElementById('registerPassword');
            const registerMsg = document.getElementById('registerMsg');
            const loginForm = document.getElementById('loginForm');
            const loginEmail = document.getElementById('loginEmail');
            const loginPassword = document.getElementById('loginPassword');
            const loginMsg = document.getElementById('loginMsg');
            const profileInfo = document.getElementById('profileInfo');
            const profileEmail = document.getElementById('profileEmail');
            const logoutBtn = document.getElementById('logoutBtn');
            const profilePic = document.getElementById('profilePic');
            const picUploadForm = document.getElementById('picUploadForm');
            const picUpload = document.getElementById('picUpload');
            const bannerColor = document.getElementById('bannerColor');
            const profileBanner = document.getElementById('profileBanner');
            const displayNameForm = document.getElementById('displayNameForm');
            const displayNameInput = document.getElementById('displayNameInput');
            let currentUser = null;
            // Profile customization logic in settings modal
            // Reset profile customization
            const resetProfileBtn = document.getElementById('resetProfileBtn');
            resetProfileBtn.addEventListener('click', function () {
                if (!currentUser) {
                    alert('You must be logged in to reset your profile.');
                    return;
                }
                // Reset values
                profilePic.src = 'https://www.gravatar.com/avatar?d=mp&s=80';
                profileBanner.style.background = '#eaf6ee';
                bannerColor.value = '#eaf6ee';
                displayNameInput.value = '';
                // Save to Firestore
                db.collection('users').doc(currentUser.uid).set({
                    profilePic: 'https://www.gravatar.com/avatar?d=mp&s=80',
                    bannerColor: '#eaf6ee',
                    displayName: ''
                }, { merge: true }).then(() => {
                    updateDisplayNameUI('');
                    settingsModal.style.display = 'none';
                });
            });
            const openSettingsBtn = document.getElementById('openSettingsBtn');
            const settingsModal = document.getElementById('settingsModal');
            const closeSettingsBtn = document.getElementById('closeSettingsBtn');
            openSettingsBtn.addEventListener('click', function () {
                settingsModal.style.display = 'flex';
            });
            closeSettingsBtn.addEventListener('click', function () {
                settingsModal.style.display = 'none';
            });
            settingsModal.addEventListener('click', function (e) {
                if (e.target === settingsModal) settingsModal.style.display = 'none';
            });
            picUploadForm.addEventListener('submit', function (e) {
                e.preventDefault();
                const file = picUpload.files[0];
                if (file && currentUser) {
                    const reader = new FileReader();
                    reader.onload = function (ev) {
                        profilePic.src = ev.target.result;
                        // Save profile picture to Firestore
                        db.collection('users').doc(currentUser.uid).set({ profilePic: ev.target.result }, { merge: true })
                            .then(() => {
                                settingsModal.style.display = 'none';
                            });
                    };
                    reader.readAsDataURL(file);
                } else if (!currentUser) {
                    alert('You must be logged in to change your profile picture.');
                }
            });
            bannerColor.addEventListener('input', function () {
                profileBanner.style.background = bannerColor.value;
                // Save banner color to Firestore
                if (currentUser) {
                    db.collection('users').doc(currentUser.uid).set({ bannerColor: bannerColor.value }, { merge: true });
                }
            });
            displayNameForm.addEventListener('submit', function (e) {
                e.preventDefault();
                const name = displayNameInput.value.trim();
                const saveBtn = displayNameForm.querySelector('button[type="submit"]');
                if (saveBtn) saveBtn.disabled = true;
                if (name && currentUser) {
                    // Save display name to Firestore
                    db.collection('users').doc(currentUser.uid).set({ displayName: name }, { merge: true })
                        .then(() => {
                            displayNameInput.value = name;
                            displayNameInput.style.background = '#eaf6ee';
                            // Show feedback
                            saveBtn.textContent = 'Saved!';
                            setTimeout(() => {
                                saveBtn.textContent = 'Save';
                                settingsModal.style.display = 'none';
                                saveBtn.disabled = false;
                            }, 900);
                            // Update display name in UI
                            updateDisplayNameUI(name);
                        })
                        .catch(() => {
                            saveBtn.textContent = 'Error';
                            setTimeout(() => {
                                saveBtn.textContent = 'Save';
                                saveBtn.disabled = false;
                            }, 1200);
                        });
                }
                // Optionally handle not logged in
                else if (!currentUser) {
                    alert('You must be logged in to change your display name.');
                    if (saveBtn) saveBtn.disabled = false;
                } else {
                    if (saveBtn) saveBtn.disabled = false;
                }
            });

            // Show profile container (for demo, you can add a menu button to open it)
            // Uncomment below to show profile on page load for testing:
            // profileContainer.style.display = '';

            // Register
            registerForm.addEventListener('submit', function (e) {
                e.preventDefault();
                registerMsg.textContent = '';
                firebase.auth().createUserWithEmailAndPassword(registerEmail.value, registerPassword.value)
                    .then(userCredential => {
                        registerMsg.style.color = '#4a7c59';
                        registerMsg.textContent = 'Registration successful!';
                        registerForm.reset();
                        authForms.style.display = 'none';
                        profileInfo.style.display = '';
                        profileEmail.textContent = 'Logged in as: ' + userCredential.user.email;
                    })
                    .catch(error => {
                        registerMsg.style.color = '#e57373';
                        registerMsg.textContent = error.message;
                    });
            });

            // Login
            loginForm.addEventListener('submit', function (e) {
                e.preventDefault();
                loginMsg.textContent = '';
                firebase.auth().signInWithEmailAndPassword(loginEmail.value, loginPassword.value)
                    .then(userCredential => {
                        loginMsg.style.color = '#4a7c59';
                        loginMsg.textContent = 'Login successful!';
                        loginForm.reset();
                    })
                    .catch(error => {
                        loginMsg.style.color = '#e57373';
                        loginMsg.textContent = error.message;
                    });
            });

            // Logout
            logoutBtn.addEventListener('click', function () {
                firebase.auth().signOut();
            });

            // Update UI on auth state change
            function updateProfileUI() {
                currentUser = firebase.auth().currentUser;
                if (currentUser) {
                    authForms.style.display = 'none';
                    profileInfo.style.display = '';
                    profileEmail.textContent = 'Logged in as: ' + currentUser.email;
                    profileContainer.style.display = '';
                    // Load display name from Firestore
                    db.collection('users').doc(currentUser.uid).get().then(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.displayName) {
                                updateDisplayNameUI(data.displayName);
                            } else {
                                updateDisplayNameUI('');
                            }
                            // Load banner color
                            if (data.bannerColor) {
                                profileBanner.style.background = data.bannerColor;
                                bannerColor.value = data.bannerColor;
                            } else {
                                profileBanner.style.background = '#eaf6ee';
                                bannerColor.value = '#eaf6ee';
                            }
                            // Load profile picture
                            if (data.profilePic) {
                                profilePic.src = data.profilePic;
                            } else {
                                profilePic.src = 'https://www.gravatar.com/avatar?d=mp&s=80';
                            }
                        } else {
                            updateDisplayNameUI('');
                            profileBanner.style.background = '#eaf6ee';
                            bannerColor.value = '#eaf6ee';
                            profilePic.src = 'https://www.gravatar.com/avatar?d=mp&s=80';
                        }
                    });
                } else {
                    authForms.style.display = '';
                    profileInfo.style.display = 'none';
                    profileEmail.textContent = '';
                    updateDisplayNameUI('');
                    // Hide profile container unless user opens it
                    // profileContainer.style.display = 'none';
                }
            }

            // Display name UI update (top-level scope)
            function updateDisplayNameUI(name) {
                let displayNameElem = document.getElementById('profileDisplayName');
                if (displayNameElem) {
                    displayNameElem.textContent = name ? name : '';
                }
            }
            firebase.auth().onAuthStateChanged(updateProfileUI);
            // Notes modal logic
            const openNotesBtn = document.getElementById('openNotesBtn');
            const notesModal = document.getElementById('notesModal');
            const closeNotesModal = document.getElementById('closeNotesModal');
            const notesTextarea = document.getElementById('notesTextarea');
            const saveNotesBtn = document.getElementById('saveNotesBtn');
            const eraseNotesBtn = document.getElementById('eraseNotesBtn');
            const notesSavedMsg = document.getElementById('notesSavedMsg');

            openNotesBtn.addEventListener('click', function () {
                notesModal.classList.add('show');
                closeSidebar();
                // Load saved notes
                notesTextarea.value = localStorage.getItem('userNotes') || '';
                notesSavedMsg.style.display = 'none';
            });
            closeNotesModal.addEventListener('click', function () {
                notesModal.classList.remove('show');
                notesSavedMsg.style.display = 'none';
            });
            notesModal.addEventListener('click', function (e) {
                if (e.target === notesModal) {
                    notesModal.classList.remove('show');
                    notesSavedMsg.style.display = 'none';
                }
            });
            saveNotesBtn.addEventListener('click', function () {
                localStorage.setItem('userNotes', notesTextarea.value);
                notesSavedMsg.style.display = 'block';
                setTimeout(() => { notesSavedMsg.style.display = 'none'; }, 1200);
            });
            eraseNotesBtn.addEventListener('click', function () {
                notesTextarea.value = '';
                localStorage.removeItem('userNotes');
                notesSavedMsg.style.display = 'none';
            });
            // Store favorites locally
            function saveFavoritesToLocal() {
                localStorage.setItem('favorites', JSON.stringify(favorites.map(r => r.title)));
            }
            function loadFavoritesFromLocal() {
                const favTitles = JSON.parse(localStorage.getItem('favorites') || '[]');
                favorites = recipes.filter(r => favTitles.includes(r.title));
                updateFavoritesSidebar();
            }
            // Home button removed
            // Sidebar menu open/close logic
            const menuBtn = document.getElementById('menuBtn');
            const sidebarMenu = document.getElementById('sidebarMenu');
            const sidebarBackdrop = document.getElementById('sidebarBackdrop');
            const closeSidebarBtn = document.getElementById('closeSidebarBtn');
            function closeSidebar() {
                sidebarMenu.classList.remove('show');
                sidebarBackdrop.classList.remove('show');
            }
            menuBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                sidebarMenu.classList.add('show');
                sidebarBackdrop.classList.add('show');
            });
            closeSidebarBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                closeSidebar();
            });
            sidebarBackdrop.addEventListener('click', closeSidebar);
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closeSidebar();
            });
            // ...existing code...
            // Right sidebar (heart menu) logic
            const openHeartMenuBtn = document.getElementById('openHeartMenu');
            const rightSidebarMenu = document.getElementById('rightSidebarMenu');
            const rightSidebarBackdrop = document.getElementById('rightSidebarBackdrop');
            const closeRightSidebarBtn = document.getElementById('closeRightSidebarBtn');
            openHeartMenuBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                rightSidebarMenu.classList.add('show');
                rightSidebarBackdrop.classList.add('show');
            });
            function closeRightSidebar() {
                rightSidebarMenu.classList.remove('show');
                rightSidebarBackdrop.classList.remove('show');
            }
            closeRightSidebarBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                closeRightSidebar();
            });
            rightSidebarBackdrop.addEventListener('click', closeRightSidebar);
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closeRightSidebar();
            });

            // Sidebar navigation logic
            const openProfileBtn = document.getElementById('openProfileBtn');

                    } else if (val === '=') {
                        try {
                            // Replace division and multiplication symbols for eval
                            let expr = calcValue.replace(/÷/g, '/').replace(/×/g, '*').replace(/−/g, '-');
                            // Only allow numbers and operators

                        }
                        updateCalcDisplay();
                    } else {

            const conversionRates = {
                cups: { cups: 1, tablespoons: 16, teaspoons: 48, grams: 240, ounces: 8, milliliters: 240 },
                tablespoons: { cups: 0.0625, tablespoons: 1, teaspoons: 3, grams: 15, ounces: 0.5, milliliters: 15 },

                    converterResult.textContent = 'Invalid conversion.';
                    return;

                // Calculate and round up to 2 decimal places
                let rawResult = value * conversionRates[from][to];
                let roundedResult = Math.ceil(rawResult * 100) / 100;
                // Show with 2 decimals
                converterResult.textContent = `${value} ${from} = ${roundedResult.toFixed(2)} ${to}`;

            function loadTimerState() {

                if (state) {

            }
            function clearTimerState() {
                localStorage.removeItem('timerState');
                timerState = { endTimestamp: null, running: false };

            function updateTimerDisplay() {
                if (timerState.paused) {
                    let remaining = timerState.pausedRemaining;
                    if (remaining > 0) {
                        let mins = Math.floor(remaining / 60);
                        let secs = remaining % 60;
                        timerDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')} paused`;
                    } else {

                    }
                } else if (timerState.endTimestamp !== null && timerState.running) {

                    } else {

                    }
                } else {

                }
            }

                    } else {

            // Favorites array
            let favorites = [];
            // Firestore reference
            const db = firebase.firestore();

            function saveFavoritesToCloud() {
                if (currentUser) {
                    db.collection('users').doc(currentUser.uid).set({
                        favorites: favorites.map(r => r.title)
                    }, { merge: true });
                }
            }

            function loadFavoritesFromCloud() {
                if (currentUser) {
                    db.collection('users').doc(currentUser.uid).get().then(doc => {
                        if (doc.exists && doc.data().favorites) {
                            favorites = recipes.filter(r => doc.data().favorites.includes(r.title));
                            updateFavoritesSidebar();
                        }
                    });
                }
            }

            // Update favorites when user changes
            firebase.auth().onAuthStateChanged(function (user) {
                currentUser = user;
                updateProfileUI();
                if (currentUser) {
                    loadFavoritesFromCloud();
                } else {
                    loadFavoritesFromLocal();
                }
            });

            // Recipe modal logic
            function showRecipeModal(recipe) {
                // Create modal
                let modal = document.createElement('div');
                modal.className = 'modal-converter show';
                modal.style.zIndex = 4000;
                modal.innerHTML = `
                    <div class="modal-content" style="font-size:1.25rem;line-height:1.7;">
                        <button class="modal-close-btn" aria-label="Close recipe">&times;</button>
                        <h2 style="font-size:2rem;margin-bottom:0.7rem;">${recipe.title}</h2>
                        <p style="color:#888;margin-bottom:1rem;font-size:1.15rem;text-align:center;">${recipe.desc}</p>
                        <strong style="font-size:1.2rem;">Ingredients:</strong>
                        <ul style="margin-bottom:1rem;font-size:1.15rem;">${recipe.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
                        <strong style="font-size:1.2rem;">Bake:</strong> <span style="font-size:1.15rem;">${recipe.ovenTime} at ${recipe.ovenTemp}</span><br><br>
                        <strong style="font-size:1.2rem;">Instructions:</strong>
                        <ol style="font-size:1.25rem;line-height:1.7;margin-left:1.2rem;">
                            ${(() => {
                        // Split by numbered steps, or fallback to splitting by newlines
                        let steps = recipe.instructions.match(/(\d+\.\s.*?)(?=\n\d+\.|$)/gs);
                        if (!steps) {
                            steps = recipe.instructions.split(/\n+/).filter(s => s.trim());
                        }
                        return steps.map((step, i) => `<li style='margin-bottom:0.8rem;'>${step.replace(/^\d+\.\s*/, '').trim()}</li>`).join('');
                    })()}
                        </ol>
                    </div>
                `;
                document.body.appendChild(modal);
                // Close modal
                modal.querySelector('.modal-close-btn').addEventListener('click', function () {
                    modal.remove();
                });
                // Heart icon logic
                modal.querySelector('.heart-icon-btn').addEventListener('click', function () {
                    if (favorites.includes(recipe)) {
                        favorites = favorites.filter(f => f !== recipe);
                    } else {
                        favorites.push(recipe);
                    }
                    updateFavoritesSidebar();
                    if (currentUser) {
                        saveFavoritesToCloud();
                    } else {
                        saveFavoritesToLocal();
                    }
                    modal.remove();
                });
                // Close modal on backdrop click
                modal.addEventListener('click', function (e) {
                    if (e.target === modal) modal.remove();
                });
            }

            // Display recipes in search page
            const recipeList = document.getElementById('recipeList');
            function displayRecipes(recipesToShow) {
                recipeList.innerHTML = '';
                // Sort recipes alphabetically by title
                recipesToShow.sort((a, b) => a.title.localeCompare(b.title));
                if (recipesToShow.length === 0) {
                    const msg = document.createElement('li');
                    msg.style.listStyle = 'none';
                    msg.style.padding = '2rem';
                    msg.style.textAlign = 'center';
                    msg.style.color = '#888';
                    msg.textContent = 'No recipes found.';
                    recipeList.appendChild(msg);
                    return;
                }
                recipesToShow.forEach(recipe => {
                    const li = document.createElement('li');
                    li.style.listStyle = 'none';
                    li.style.padding = '1rem';
                    li.style.borderBottom = '1px solid #eee';

            let selectedCategory = "all";
            let selectedTaste = "all";
            function filteredRecipes() {
                const query = searchBar.value.trim().toLowerCase();
                let filtered = recipes;
                if (selectedCategory !== "all") {
                    const catTitles = recipeCategories[selectedCategory] || [];
                    filtered = filtered.filter(r => catTitles.some(t => r.title.toLowerCase().includes(t.toLowerCase())));
                }
                if (selectedTaste && selectedTaste !== "all") {
                    if (selectedTaste === "vegan") {
                        filtered = filtered.filter(r => r.vegan === true);
                    } else {
                        const tasteTitles = tasteMap[selectedTaste] || [];
                        filtered = filtered.filter(r => tasteTitles.some(t => r.title.toLowerCase().includes(t.toLowerCase())));
                    }
                }
                if (query) {
                    filtered = filtered.filter(r => r.title.toLowerCase().includes(query) || r.desc.toLowerCase().includes(query));
                }
                return filtered;
            }

                    this.style.background = '#6ab187';
                    this.style.color = '#fff';

                    document.querySelectorAll('.taste-btn').forEach(b => {

                    this.style.background = '#6ab187';

                });

            searchBar.addEventListener('input', function () {
                displayRecipes(filteredRecipes());

            // Initial display

                loadFavoritesFromLocal();

            displayRecipes(filteredRecipes());

            // Favorites sidebar logic
            function updateFavoritesSidebar() {
                const sidebar = document.getElementById('rightSidebarMenu');
                // Remove old list
                let oldList = sidebar.querySelector('.favorites-list');
                if (oldList) oldList.remove();
                // Add new list
                if (favorites.length === 0) return;
                const ul = document.createElement('ul');
                ul.className = 'favorites-list';
                ul.style.padding = '1rem';
                ul.style.margin = 0;
                favorites.forEach(recipe => {
                    const li = document.createElement('li');
                    li.style.listStyle = 'none';
                    li.style.padding = '0.7rem';

                    li.style.display = 'flex';
                    li.style.justifyContent = 'space-between';
                    li.style.alignItems = 'center';
                    li.innerHTML = `
                        <span style="font-weight:bold;color:#4a7c59;cursor:pointer;">${recipe.title}</span>
                        <button class="heart-icon-btn" style="background:none;border:none;" aria-label="Remove from favorites">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 21s-6.2-5.2-8.4-8.1C1.2 10.1 2.1 7 5 6.2c1.7-.5 3.4.3 4.4 1.7C10.9 9.1 11.5 9 12 9s1.1.1 2.6-1.1c1-1.4 2.7-2.2 4.4-1.7 2.9.8 3.8 3.9 1.4 6.7C18.2 15.8 12 21 12 21z" fill="#4a7c59" stroke="#4a7c59" stroke-width="1.5" />
                            </svg>
                        </button>
                    `;
                    li.querySelector('span').addEventListener('click', function () {
                        showRecipeModal(recipe);
                    });
                    li.querySelector('.heart-icon-btn').addEventListener('click', function () {
                        favorites = favorites.filter(f => f !== recipe);
                        updateFavoritesSidebar();
                        if (currentUser) {
                            saveFavoritesToCloud();
                        } else {
                            saveFavoritesToLocal();
                        }
                        displayRecipes(filteredRecipes());
                    });
                    ul.appendChild(li);
                });
                sidebar.appendChild(ul);
            }
        });
    </script>
</body>

</html>
