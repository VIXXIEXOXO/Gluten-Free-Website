<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gluten-Free Baking Recipes</title>
    <style>
        /* Right sidebar (heart menu) styles */
        .right-sidebar-menu {
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            width: 75vw;
            max-width: 320px;
            min-width: 220px;
            background: #fff;
            /* box-shadow removed */
            z-index: 2100;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(.4, 0, .2, 1);
            display: flex;
            flex-direction: column;
            padding-top: 0;
        }

        .right-sidebar-menu.show {
            transform: translateX(0);
        }

        .right-sidebar-header {
            display: flex;
            align-items: center;
            padding: 1.2rem 1.2rem 0.5rem 1.2rem;
            border-bottom: 1px solid #eee;
        }

        .right-sidebar-menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.5rem;
        }

        .right-sidebar-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.18);
            z-index: 2000;
        }

        .right-sidebar-backdrop.show {
            display: block;
        }

        @media (max-width: 600px) {
            .right-sidebar-menu {
                width: 90vw;
                min-width: 0;
                max-width: 98vw;
            }
        }

        html {
            box-sizing: border-box;
            font-size: 16px;
        }

        *,
        *:before,
        *:after {
            box-sizing: inherit;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f8f8f8;
            margin: 0;
            padding: 0;
        }

        header {
            background: #6ab187;
            color: white;
            padding: 2.5vw 0 2vw 0;
            text-align: center;
            position: relative;
        }

        .header-icon {
            position: absolute;
            top: 1.5vw;
            width: 8vw;
            max-width: 40px;
            min-width: 28px;
            height: 8vw;
            max-height: 40px;
            min-height: 28px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .menu-icon {
            left: 2vw;
        }

        .heart-icon {
            right: 2vw;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0.5rem 0 0.2rem 0;
        }

        header p {
            font-size: 1.1rem;
            margin: 0 0 0.5rem 0;
        }

        .container {
            max-width: 800px;
            width: 92vw;
            margin: 4vw auto;
            background: white;
            padding: 5vw 4vw;
            border-radius: 2vw;
            /* box-shadow removed */
        }

        #searchBar {
            width: 100%;
            padding: 1vw 0.5vw;
            font-size: 0.95rem;
            border: 1px solid #ccc;
            border-radius: 1vw;
            margin-bottom: 4vw;
        }

        .recipe-list {
            list-style: none;
            padding: 0;
        }

        .recipe-item {
            padding: 3vw 0;
            border-bottom: 1px solid #eee;
        }

        .recipe-item:last-child {
            border-bottom: none;
        }

        .recipe-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #4a7c59;
        }

        .recipe-desc {
            color: #555;
            margin-top: 0.5rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.6rem;
            }

            .container {
                padding: 6vw 2vw;
            }

            #searchBar {
                font-size: 0.85rem;
                padding: 0.7vw 0.3vw;
            }

            .header-icon {
                min-width: 24px;
                min-height: 24px;
                max-width: 32px;
                max-height: 32px;
            }
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 1.1rem;
            }

            .container {
                padding: 4vw 1vw;
            }
        }
    </style>
    <!-- Firebase scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        /* Modal styles for converter */
        .modal-converter {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            overflow: auto;
            background: rgba(0, 0, 0, 0.25);
            align-items: center;
            justify-content: center;
        }

        .modal-converter.show {
            display: flex;
        }

        .modal-content {
            background: #fff;
            margin: auto;
            border-radius: 1.2rem;
            padding: 2rem 1.5rem 1.5rem 1.5rem;
            max-width: 95vw;
            width: 350px;
            /* box-shadow removed */
            position: relative;
        }

        @media (min-width: 800px) {
            .modal-content {
                width: 500px;
                min-width: 400px;
            }
        }

        .modal-close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #4a7c59;
            cursor: pointer;
        }

        .modal-content h2 {
            margin-top: 0;
            color: #4a7c59;
            font-size: 1.3rem;
            text-align: center;
        }

        .converter-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .converter-form input,
        .converter-form select {
            padding: 0.5rem;
            font-size: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #ccc;
        }

        .converter-form button {
            background: #4a7c59;
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            padding: 0.7rem;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .converter-result {
            text-align: center;
            margin-top: 0.5rem;
            color: #333;
            font-weight: bold;
        }

        @media (max-width: 400px) {
            .modal-content {
                padding: 1rem 0.5rem 1rem 0.5rem;
                width: 98vw;
            }
        }
    </style>
    <style>
        /* Sidebar menu styles */
        .sidebar-menu {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 75vw;
            max-width: 320px;
            min-width: 220px;
            background: #fff;
            /* box-shadow removed */
            z-index: 2000;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(.4, 0, .2, 1);
            display: flex;
            flex-direction: column;
            padding-top: 0;
        }

        .sidebar-menu.show {
            transform: translateX(0);
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            padding: 1.2rem 1.2rem 0.5rem 1.2rem;
            border-bottom: 1px solid #eee;
        }

        .sidebar-menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.5rem;
        }

        .sidebar-menu-list {
            display: flex;
            flex-direction: column;
            padding: 1rem 0;
        }

        .sidebar-menu-list button {
            width: 100%;
            background: none;
            border: none;
            padding: 1rem 1.5rem;
            text-align: left;
            font-size: 1.1rem;
            color: #333;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-menu-list button:hover {
            background: #f0f0f0;
        }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.18);
            z-index: 1500;
        }

        .sidebar-backdrop.show {
            display: block;
        }

        @media (max-width: 600px) {
            .sidebar-menu {
                width: 90vw;
                min-width: 0;
                max-width: 98vw;
            }
        }
    </style>
</head>

<body>
    <!-- Timer Modal -->
    <div class="modal-converter" id="timerModal">
        <div class="modal-content">
            <button class="modal-close-btn" id="closeTimerModal" aria-label="Close timer">&times;</button>
            <h2>Oven Baking Timer</h2>
            <form id="timerForm" style="display:flex;flex-direction:column;gap:1rem;align-items:center;">
                <label for="timerMinutes" style="font-size:1.1rem;color:#4a7c59;">Set timer (minutes):</label>
                <input type="number" id="timerMinutes" min="1" max="240" step="1" required
                    style="font-size:1.1rem;padding:0.5rem;border-radius:0.5rem;border:1px solid #6ab187;width:120px;text-align:center;">
                <button type="submit"
                    style="background:#6ab187;color:#fff;border:none;padding:0.7rem 1.5rem;border-radius:1rem;font-size:1rem;cursor:pointer;">Start
                    Timer</button>
                <button type="button" id="resetTimerBtn"
                    style="background:#e57373;color:#fff;border:none;padding:0.7rem 1.5rem;border-radius:1rem;font-size:1rem;cursor:pointer;">Reset
                    Timer</button>
            </form>
            <div id="timerDisplay" style="text-align:center;font-size:1.3rem;color:#4a7c59;margin-top:1rem;"></div>
        </div>
    </div>
    <!-- Baking Measurement Converter Modal -->
    <div class="modal-converter" id="converterModal">
        <div class="modal-content">
            <button class="modal-close-btn" id="closeConverterModal" aria-label="Close converter">&times;</button>
            <h2>Baking Measurement Converter</h2>
            <form class="converter-form" id="converterForm" autocomplete="off">
                <input type="number" id="convertValue" placeholder="Enter value" min="0" step="any" required>
                <select id="convertFrom">
                    <option value="cups">Cups</option>
                    <option value="tablespoons">Tablespoons</option>
                    <option value="teaspoons">Teaspoons</option>
                    <option value="grams">Grams</option>
                    <option value="ounces">Ounces</option>
                    <option value="milliliters">Milliliters</option>
                </select>
                <span style="text-align:center;">to</span>
                <select id="convertTo">
                    <option value="cups">Cups</option>
                    <option value="tablespoons">Tablespoons</option>
                    <option value="teaspoons">Teaspoons</option>
                    <option value="grams">Grams</option>
                    <option value="ounces">Ounces</option>
                    <option value="milliliters">Milliliters</option>
                </select>
                <button type="submit">Convert</button>
                <div class="converter-result" id="converterResult"></div>
            </form>
        </div>
    </div>
    <header>
        <button class="header-icon menu-icon" id="menuBtn" aria-label="Menu" type="button">
            <!-- White Hamburger menu SVG -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect y="4" width="24" height="3" rx="1.5" fill="white" />
                <rect y="10.5" width="24" height="3" rx="1.5" fill="white" />
                <rect y="17" width="24" height="3" rx="1.5" fill="white" />
            </svg>
        </button>
        <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
        <nav class="sidebar-menu" id="sidebarMenu" aria-label="Sidebar menu">
            <div class="sidebar-header">
                <button class="sidebar-menu-btn" id="closeSidebarBtn" aria-label="Close menu" type="button">
                    <!-- Green Hamburger menu SVG (sidebar only) -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect y="4" width="24" height="3" rx="1.5" fill="#4a7c59" />
                        <rect y="10.5" width="24" height="3" rx="1.5" fill="#4a7c59" />
                        <rect y="17" width="24" height="3" rx="1.5" fill="#4a7c59" />

            <div class="sidebar-menu-list">
                <button type="button" id="openTimerBtn">

                        <circle cx="12" cy="12" r="9" stroke="#4a7c59" stroke-width="2" fill="none" />
                        <rect x="11" y="6" width="2" height="7" rx="1" fill="#4a7c59" />
                        <circle cx="12" cy="12" r="1.5" fill="#4a7c59" />

                <button type="button" id="goHomeBtn">

                        <path d="M3 12l9-7 9 7" stroke="#4a7c59" stroke-width="2" fill="none" />

                        <circle cx="11" cy="11" r="8" stroke="#4a7c59" stroke-width="2" fill="none" />
                        <line x1="18" y1="18" x2="23" y2="23" stroke="#4a7c59" stroke-width="2" />
                    </svg>
                    Search
                </button>
                <button type="button" id="openConverterBtn">
                    <!-- Convert icon SVG (fixed, centered) -->

                    Profile

            </svg>

                    <!-- Heart SVG icon for Favorites menu -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

    <div class="container" id="mainContainer">

            style="text-align:center; color:#888; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            Welcome to Gluten-Free Baking!<br>Use the menu to get started.</p>

    <div class="container" id="searchContainer" style="display:none;">

            <!-- Recipes will appear here -->

    <div class="container" id="profileContainer" style="display:none;">
        <h2 style="color:#4a7c59;text-align:center;">Profile</h2>
        <div style="text-align:center;margin-bottom:2rem;">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="8" r="4" stroke="#4a7c59" stroke-width="2" fill="#eaf6ee" />
                <path d="M4 20c0-4 8-4 8-4s8 0 8 4" stroke="#4a7c59" stroke-width="2" fill="#eaf6ee" />
            </svg>
        </div>

            <p style="font-size:1.1rem;color:#555;">Name: <span id="profileName">Guest</span></p>
            <p style="font-size:1.1rem;color:#555;">Email: <span id="profileEmail">guest@example.com</span></p>
            <button id="signInBtn"
                style="background:#4285F4;color:#fff;border:none;padding:0.7rem 1.5rem;border-radius:1rem;font-size:1rem;cursor:pointer;margin-top:1rem;">

                            d="M21.35 11.1h-9.18v2.8h5.22c-.22 1.2-1.32 3.5-5.22 3.5-3.14 0-5.7-2.6-5.7-5.8s2.56-5.8 5.7-5.8c1.8 0 3 .7 3.7 1.3l2.5-2.4C17.1 3.7 15.2 2.7 12.9 2.7c-5.1 0-9.2 4.1-9.2 9.2s4.1 9.2 9.2 9.2c5.3 0 8.8-3.7 8.8-8.9 0-.6-.1-1.1-.2-1.7z" />
                        <path fill="#4285F4"
                            d="M21.35 11.1h-9.18v2.8h5.22c-.22 1.2-1.32 3.5-5.22 3.5-3.14 0-5.7-2.6-5.7-5.8s2.56-5.8 5.7-5.8c1.8 0 3 .7 3.7 1.3l2.5-2.4C17.1 3.7 15.2 2.7 12.9 2.7c-5.1 0-9.2 4.1-9.2 9.2s4.1 9.2 9.2 9.2c5.3 0 8.8-3.7 8.8-8.9 0-.6-.1-1.1-.2-1.7z" />
                        <path fill="#34A853"
                            d="M12.17 17.4c2.9 0 4.8-1.2 5.7-3.5l-5.7-2.8v-2.8h9.18c.1.6.2 1.1.2 1.7 0 5.2-3.5 8.9-8.8 8.9-5.1 0-9.2-4.1-9.2-9.2s4.1-9.2 9.2-9.2c2.3 0 4.2 1 5.6 2.6l-2.5 2.4c-.7-.6-1.9-1.3-3.7-1.3-3.14 0-5.7 2.6-5.7 5.8s2.56 5.8 5.7 5.8z" />

                Sign in with Google

                Out</button>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Firebase Google sign-in logic
            const signInBtn = document.getElementById('signInBtn');
            const signOutBtn = document.getElementById('signOutBtn');
            let currentUser = null;
            signInBtn.addEventListener('click', function () {
                const provider = new firebase.auth.GoogleAuthProvider();
                firebase.auth().signInWithPopup(provider)
                    .then((result) => {
                        currentUser = result.user;
                        updateProfileUI();
                    })
                    .catch((error) => {
                        alert('Sign-in failed: ' + error.message);
                    });
            });
            signOutBtn.addEventListener('click', function () {
                firebase.auth().signOut().then(() => {
                    currentUser = null;
                    updateProfileUI();
                });
            });
            firebase.auth().onAuthStateChanged(function (user) {
                currentUser = user;
                updateProfileUI();
            });
            function updateProfileUI() {
                if (currentUser) {
                    document.getElementById('profileName').textContent = currentUser.displayName || 'Google User';
                    document.getElementById('profileEmail').textContent = currentUser.email || '';
                    signInBtn.style.display = 'none';
                    signOutBtn.style.display = '';
                } else {
                    document.getElementById('profileName').textContent = 'Guest';
                    document.getElementById('profileEmail').textContent = 'guest@example.com';
                    signInBtn.style.display = '';
                    signOutBtn.style.display = 'none';
                }
            }
            // Home button logic
            const goHomeBtn = document.getElementById('goHomeBtn');
            goHomeBtn.addEventListener('click', function () {
                mainContainer.style.display = '';
                searchContainer.style.display = 'none';
                closeSidebar();
            });
            // Sidebar menu open/close logic
            const menuBtn = document.getElementById('menuBtn');
            const sidebarMenu = document.getElementById('sidebarMenu');
            const sidebarBackdrop = document.getElementById('sidebarBackdrop');
            const closeSidebarBtn = document.getElementById('closeSidebarBtn');
            function closeSidebar() {
                sidebarMenu.classList.remove('show');
                sidebarBackdrop.classList.remove('show');
            }
            menuBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                sidebarMenu.classList.add('show');
                sidebarBackdrop.classList.add('show');
            });
            closeSidebarBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                closeSidebar();
            });
            sidebarBackdrop.addEventListener('click', closeSidebar);

            // Simple conversion logic (approximate, for common baking measures)
            const conversionRates = {
                cups: { cups: 1, tablespoons: 16, teaspoons: 48, grams: 236.588, ounces: 8.3454, milliliters: 236.588 },
                tablespoons: { cups: 0.0625, tablespoons: 1, teaspoons: 3, grams: 14.787, ounces: 0.5216, milliliters: 14.787 },
                teaspoons: { cups: 0.0208, tablespoons: 0.3333, teaspoons: 1, grams: 4.929, ounces: 0.1736, milliliters: 4.929 },
                grams: { cups: 0.0042, tablespoons: 0.0676, teaspoons: 0.2029, grams: 1, ounces: 0.0353, milliliters: 1 },
                ounces: { cups: 0.12, tablespoons: 1.917, teaspoons: 5.75, grams: 28.3495, ounces: 1, milliliters: 28.3495 },
                milliliters: { cups: 0.0042, tablespoons: 0.0676, teaspoons: 0.2029, grams: 1, ounces: 0.0353, milliliters: 1 }
            };

            converterForm.addEventListener('submit', function (e) {
                e.preventDefault();
                const value = parseFloat(convertValue.value);
                const from = convertFrom.value;
                const to = convertTo.value;
                if (isNaN(value) || !conversionRates[from] || !conversionRates[from][to]) {
                    converterResult.textContent = 'Invalid conversion.';
                    return;
                }
                const result = value * conversionRates[from][to];
                converterResult.textContent = `${value} ${from} = ${result.toFixed(2)} ${to}`;
            });

            const timerModal = document.getElementById('timerModal');
            const closeTimerModal = document.getElementById('closeTimerModal');
            const timerForm = document.getElementById('timerForm');
            const timerMinutes = document.getElementById('timerMinutes');
            const timerDisplay = document.getElementById('timerDisplay');
            let timerInterval = null;
            let timerState = {
                totalSeconds: null,
                running: false
            };

            function saveTimerState() {
                localStorage.setItem('timerState', JSON.stringify(timerState));
            }
            function loadTimerState() {
                const state = localStorage.getItem('timerState');
                if (state) {
                    timerState = JSON.parse(state);
                } else {
                    timerState = { totalSeconds: null, running: false };
                }
            }
            function clearTimerState() {
                localStorage.removeItem('timerState');
                timerState = { totalSeconds: null, running: false };
            }

            function updateTimerDisplay() {
                if (timerState.totalSeconds !== null && timerState.totalSeconds >= 0) {
                    let mins = Math.floor(timerState.totalSeconds / 60);
                    let secs = timerState.totalSeconds % 60;
                    timerDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')} remaining`;
                    if (timerState.totalSeconds <= 0) {
                        timerDisplay.textContent = 'Time is up!';
                        timerState.running = false;
                        saveTimerState();
                        clearInterval(timerInterval);
                    }
                } else {
                    timerDisplay.textContent = '';
                }
            }

            function startTimer() {
                clearInterval(timerInterval);
                timerInterval = setInterval(function () {
                    if (timerState.running && timerState.totalSeconds > 0) {
                        timerState.totalSeconds--;
                        updateTimerDisplay();
                        saveTimerState();
                    } else {
                        clearInterval(timerInterval);
                    }
                }, 1000);
            }

                timerModal.classList.add('show');

                if (timerState.totalSeconds !== null && timerState.running) {

                    startTimer();

            function saveFavoritesToCloud() {
                if (currentUser) {
                    db.collection('users').doc(currentUser.uid).set({
                        favorites: favorites.map(r => r.title)
                    }, { merge: true });
                }
            }

            function loadFavoritesFromCloud() {
                if (currentUser) {
                    db.collection('users').doc(currentUser.uid).get().then(doc => {
                        if (doc.exists && doc.data().favorites) {
                            favorites = recipes.filter(r => doc.data().favorites.includes(r.title));
                            updateFavoritesSidebar();
                        }
                    });
                }
            }

            // Update favorites when user changes
            firebase.auth().onAuthStateChanged(function (user) {
                currentUser = user;
                updateProfileUI();
                if (currentUser) {
                    loadFavoritesFromCloud();
                } else {
                    favorites = [];
                    updateFavoritesSidebar();
                }
            });

            function showRecipeModal(recipe) {

                let modal = document.createElement('div');
                modal.className = 'modal-converter show';

                modal.innerHTML = `

                        <strong style="font-size:1.2rem;">Ingredients:</strong>

                        <strong style="font-size:1.2rem;">Instructions:</strong>
                        <p style="font-size:1.25rem;line-height:1.7;">${recipe.instructions}</p>

                // Close modal
                modal.querySelector('.modal-close-btn').addEventListener('click', function () {
                    modal.remove();
                });

                        favorites = favorites.filter(f => f !== recipe);
                    } else {
                        favorites.push(recipe);
                    }
                    updateFavoritesSidebar();
                    saveFavoritesToCloud();
                    modal.remove();
                });
                // Close modal on backdrop click
                modal.addEventListener('click', function (e) {
                    if (e.target === modal) modal.remove();
                });
            }

                if (!query) return recipes;
                return recipes.filter(r => r.title.toLowerCase().includes(query) || r.desc.toLowerCase().includes(query));
