<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gluten-Free Baking Recipes</title>
    <style>
        /* Right sidebar (heart menu) styles */
        .right-sidebar-menu {
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            width: 75vw;
            max-width: 320px;
            min-width: 220px;
            background: #fff;
            /* box-shadow removed */
            z-index: 2100;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(.4, 0, .2, 1);
            display: flex;
            flex-direction: column;
            padding-top: 0;
        }

        .right-sidebar-menu.show {
            transform: translateX(0);
        }

        .right-sidebar-header {
            display: flex;
            align-items: center;
            padding: 1.2rem 1.2rem 0.5rem 1.2rem;
            border-bottom: 1px solid #eee;
        }

        .right-sidebar-menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.5rem;
        }

        .right-sidebar-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.18);
            z-index: 2000;
        }

        .right-sidebar-backdrop.show {
            display: block;
        }

        @media (max-width: 600px) {
            .right-sidebar-menu {
                width: 90vw;
                min-width: 0;
                max-width: 98vw;
            }
        }

        html {
            box-sizing: border-box;
            font-size: 16px;
        }

        *,
        *:before,
        *:after {
            box-sizing: inherit;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f8f8f8;
            margin: 0;
            padding: 0;
        }

        header {
            background: #6ab187;
            color: white;
            padding: 2.5vw 0 2vw 0;
            text-align: center;
            position: relative;
        }

        .header-icon {
            position: absolute;
            top: 1.5vw;
            width: 8vw;
            max-width: 40px;
            min-width: 28px;
            height: 8vw;
            max-height: 40px;
            min-height: 28px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .menu-icon {
            left: 2vw;
        }

        .heart-icon {
            right: 2vw;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0.5rem 0 0.2rem 0;
        }

        header p {
            font-size: 1.1rem;
            margin: 0 0 0.5rem 0;
        }

        .container {
            max-width: 800px;
            width: 92vw;
            margin: 4vw auto;
            background: white;
            padding: 5vw 4vw;
            border-radius: 2vw;
            /* box-shadow removed */
        }

        #searchBar {
            width: 100%;
            padding: 3vw 1vw;
            font-size: 1.1rem;
            border: 1px solid #ccc;
            border-radius: 1vw;
            margin-bottom: 4vw;
        }

        .recipe-list {
            list-style: none;
            padding: 0;
        }

        .recipe-item {
            padding: 3vw 0;
            border-bottom: 1px solid #eee;
        }

        .recipe-item:last-child {
            border-bottom: none;
        }

        .recipe-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #4a7c59;
        }

        .recipe-desc {
            color: #555;
            margin-top: 0.5rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.6rem;
            }

            .container {
                padding: 6vw 2vw;
            }

            #searchBar {
                font-size: 1rem;
            }

            .header-icon {
                min-width: 24px;
                min-height: 24px;
                max-width: 32px;
                max-height: 32px;
            }
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 1.1rem;
            }

            .container {
                padding: 4vw 1vw;
            }
        }
    </style>
    <style>
        /* Modal styles for converter */
        .modal-converter {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            overflow: auto;
            background: rgba(0, 0, 0, 0.25);
            align-items: center;
            justify-content: center;
        }

        .modal-converter.show {
            display: flex;
        }

        .modal-content {
            background: #fff;
            margin: auto;
            border-radius: 1.2rem;
            padding: 2rem 1.5rem 1.5rem 1.5rem;
            max-width: 95vw;
            width: 350px;
            /* box-shadow removed */
            position: relative;
        }

        @media (min-width: 800px) {
            .modal-content {
                width: 500px;
                min-width: 400px;
            }
        }

        .modal-close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #4a7c59;
            cursor: pointer;
        }

        .modal-content h2 {
            margin-top: 0;
            color: #4a7c59;
            font-size: 1.3rem;
            text-align: center;
        }

        .converter-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .converter-form input,
        .converter-form select {
            padding: 0.5rem;
            font-size: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #ccc;
        }

        .converter-form button {
            background: #4a7c59;
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            padding: 0.7rem;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .converter-result {
            text-align: center;
            margin-top: 0.5rem;
            color: #333;
            font-weight: bold;
        }

        @media (max-width: 400px) {
            .modal-content {
                padding: 1rem 0.5rem 1rem 0.5rem;
                width: 98vw;
            }
        }
    </style>
    <style>
        /* Sidebar menu styles */
        .sidebar-menu {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 75vw;
            max-width: 320px;
            min-width: 220px;
            background: #fff;
            /* box-shadow removed */
            z-index: 2000;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(.4, 0, .2, 1);
            display: flex;
            flex-direction: column;
            padding-top: 0;
        }

        .sidebar-menu.show {
            transform: translateX(0);
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            padding: 1.2rem 1.2rem 0.5rem 1.2rem;
            border-bottom: 1px solid #eee;
        }

        .sidebar-menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.5rem;
        }

        .sidebar-menu-list {
            display: flex;
            flex-direction: column;
            padding: 1rem 0;
        }

        .sidebar-menu-list button {
            width: 100%;
            background: none;
            border: none;
            padding: 1rem 1.5rem;
            text-align: left;
            font-size: 1.1rem;
            color: #333;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-menu-list button:hover {
            background: #f0f0f0;
        }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.18);
            z-index: 1500;
        }

        .sidebar-backdrop.show {
            display: block;
        }

        @media (max-width: 600px) {
            .sidebar-menu {
                width: 90vw;
                min-width: 0;
                max-width: 98vw;
            }
        }
    </style>
</head>

<body>
    <!-- Baking Measurement Converter Modal -->
    <div class="modal-converter" id="converterModal">
        <div class="modal-content">
            <button class="modal-close-btn" id="closeConverterModal" aria-label="Close converter">&times;</button>
            <h2>Baking Measurement Converter</h2>
            <form class="converter-form" id="converterForm" autocomplete="off">
                <input type="number" id="convertValue" placeholder="Enter value" min="0" step="any" required>
                <select id="convertFrom">
                    <option value="cups">Cups</option>
                    <option value="tablespoons">Tablespoons</option>
                    <option value="teaspoons">Teaspoons</option>
                    <option value="grams">Grams</option>
                    <option value="ounces">Ounces</option>
                    <option value="milliliters">Milliliters</option>
                </select>
                <span style="text-align:center;">to</span>
                <select id="convertTo">
                    <option value="cups">Cups</option>
                    <option value="tablespoons">Tablespoons</option>
                    <option value="teaspoons">Teaspoons</option>
                    <option value="grams">Grams</option>
                    <option value="ounces">Ounces</option>
                    <option value="milliliters">Milliliters</option>
                </select>
                <button type="submit">Convert</button>
                <div class="converter-result" id="converterResult"></div>
            </form>
        </div>
    </div>
    <header>
        <button class="header-icon menu-icon" id="menuBtn" aria-label="Menu" type="button">
            <!-- White Hamburger menu SVG -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect y="4" width="24" height="3" rx="1.5" fill="white" />
                <rect y="10.5" width="24" height="3" rx="1.5" fill="white" />
                <rect y="17" width="24" height="3" rx="1.5" fill="white" />
            </svg>
        </button>
        <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
        <nav class="sidebar-menu" id="sidebarMenu" aria-label="Sidebar menu">
            <div class="sidebar-header">
                <button class="sidebar-menu-btn" id="closeSidebarBtn" aria-label="Close menu" type="button">
                    <!-- Green Hamburger menu SVG (sidebar only) -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect y="4" width="24" height="3" rx="1.5" fill="#4a7c59" />
                        <rect y="10.5" width="24" height="3" rx="1.5" fill="#4a7c59" />
                        <rect y="17" width="24" height="3" rx="1.5" fill="#4a7c59" />
                    </svg>
                </button>
                <span class="sidebar-header-title" style="color:#4a7c59;font-weight:bold;">Menu</span>
            </div>
            <div class="sidebar-menu-list">
                                <button type="button" id="goHomeBtn">
                                    <!-- Home icon SVG -->
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:8px;">
                                        <path d="M3 12l9-7 9 7" stroke="#4a7c59" stroke-width="2" fill="none"/>
                                        <rect x="7" y="12" width="10" height="7" stroke="#4a7c59" stroke-width="2" fill="none"/>
                                    </svg>
                                    Home
                                </button>
                <button type="button" id="openSearchPage">
                    <!-- Search icon SVG -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:8px;">
                        <circle cx="11" cy="11" r="8" stroke="#4a7c59" stroke-width="2" fill="none"/>
                        <line x1="18" y1="18" x2="23" y2="23" stroke="#4a7c59" stroke-width="2"/>
                    </svg>
                    Search
                </button>
                <button type="button" id="openConverterBtn">
                    <!-- Convert icon SVG (fixed, centered) -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:8px;">
                        <path d="M7 4v4h4" stroke="#4a7c59" stroke-width="2" fill="none"/>
                        <path d="M17 20v-4h-4" stroke="#4a7c59" stroke-width="2" fill="none"/>
                        <path d="M7 20a8 8 0 0 1 10-8" stroke="#4a7c59" stroke-width="2" fill="none"/>
                        <path d="M17 4a8 8 0 0 0-10 8" stroke="#4a7c59" stroke-width="2" fill="none"/>
                    </svg>
                    Convert
                </button>
            </div>
        </nav>
        <button class="header-icon heart-icon" aria-label="Favorites" id="openHeartMenu">
            <!-- Heart SVG -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M12 21s-6.2-5.2-8.4-8.1C1.2 10.1 2.1 7 5 6.2c1.7-.5 3.4.3 4.4 1.7C10.9 9.1 11.5 9 12 9s1.1.1 2.6-1.1c1-1.4 2.7-2.2 4.4-1.7 2.9.8 3.8 3.9 1.4 6.7C18.2 15.8 12 21 12 21z"
                    fill="#fff" stroke="#fff" stroke-width="1.5" />
            </svg>
        </button>
        <div class="right-sidebar-backdrop" id="rightSidebarBackdrop"></div>
        <nav class="right-sidebar-menu" id="rightSidebarMenu" aria-label="Heart menu">
            <div class="right-sidebar-header">
                <button class="right-sidebar-menu-btn" id="closeRightSidebarBtn" aria-label="Close heart menu"
                    type="button">
                    <!-- Heart SVG icon for Favorites menu -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 21s-6.2-5.2-8.4-8.1C1.2 10.1 2.1 7 5 6.2c1.7-.5 3.4.3 4.4 1.7C10.9 9.1 11.5 9 12 9s1.1.1 2.6-1.1c1-1.4 2.7-2.2 4.4-1.7 2.9.8 3.8 3.9 1.4 6.7C18.2 15.8 12 21 12 21z"
                            fill="#4a7c59" stroke="#4a7c59" stroke-width="1.5" />
                    </svg>
                </button>
                <span class="sidebar-header-title" style="color:#4a7c59;font-weight:bold;">Favorites</span>
            </div>
            <!-- Blank for now -->
        </nav>
        <h1>Gluten-Free Baking Recipes</h1>
        <p>Find your next favorite gluten-free treat!</p>
    </header>
    <div class="container" id="mainContainer">
        <p style="text-align:center; color:#888;">Welcome to Gluten-Free Baking!<br>Use the menu to get started.</p>
    </div>
    <div class="container" id="searchContainer" style="display:none;">
        <input type="text" id="searchBar" placeholder="Search for recipes...">
        <ul class="recipe-list" id="recipeList">
            <!-- Recipes will appear here -->
        </ul>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
                                    // Home button logic
                                    const goHomeBtn = document.getElementById('goHomeBtn');
                                    goHomeBtn.addEventListener('click', function () {
                                        mainContainer.style.display = '';
                                        searchContainer.style.display = 'none';
                                        closeSidebar();
                                    });
                        // Sidebar menu open/close logic
                        const menuBtn = document.getElementById('menuBtn');
                        const sidebarMenu = document.getElementById('sidebarMenu');
                        const sidebarBackdrop = document.getElementById('sidebarBackdrop');
                        const closeSidebarBtn = document.getElementById('closeSidebarBtn');
                        function closeSidebar() {
                            sidebarMenu.classList.remove('show');
                            sidebarBackdrop.classList.remove('show');
                        }
                        menuBtn.addEventListener('click', function (e) {
                            e.stopPropagation();
                            sidebarMenu.classList.add('show');
                            sidebarBackdrop.classList.add('show');
                        });
                        closeSidebarBtn.addEventListener('click', function (e) {
                            e.stopPropagation();
                            closeSidebar();
                        });
                        sidebarBackdrop.addEventListener('click', closeSidebar);
                        document.addEventListener('keydown', function (e) {
                            if (e.key === 'Escape') closeSidebar();
                        });
            // ...existing code...
            // Right sidebar (heart menu) logic
            const openHeartMenuBtn = document.getElementById('openHeartMenu');
            const rightSidebarMenu = document.getElementById('rightSidebarMenu');
            const rightSidebarBackdrop = document.getElementById('rightSidebarBackdrop');
            const closeRightSidebarBtn = document.getElementById('closeRightSidebarBtn');
            openHeartMenuBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                rightSidebarMenu.classList.add('show');
                rightSidebarBackdrop.classList.add('show');
            });
            function closeRightSidebar() {
                rightSidebarMenu.classList.remove('show');
                rightSidebarBackdrop.classList.remove('show');
            }
            closeRightSidebarBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                closeRightSidebar();
            });
            rightSidebarBackdrop.addEventListener('click', closeRightSidebar);
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closeRightSidebar();
            });

            // Sidebar navigation logic
            const openSearchPageBtn = document.getElementById('openSearchPage');
            const openConverterBtn = document.getElementById('openConverterBtn');
            const mainContainer = document.getElementById('mainContainer');
            const searchContainer = document.getElementById('searchContainer');

            openSearchPageBtn.addEventListener('click', function () {
                mainContainer.style.display = 'none';
                searchContainer.style.display = '';
                closeSidebar();
            });

            // Converter modal logic
            const converterModal = document.getElementById('converterModal');
            const closeConverterModal = document.getElementById('closeConverterModal');
            const converterForm = document.getElementById('converterForm');
            const convertValue = document.getElementById('convertValue');
            const convertFrom = document.getElementById('convertFrom');
            const convertTo = document.getElementById('convertTo');
            const converterResult = document.getElementById('converterResult');

            openConverterBtn.addEventListener('click', function () {
                converterModal.classList.add('show');
                closeSidebar();
            });
            closeConverterModal.addEventListener('click', function () {
                converterModal.classList.remove('show');
                converterResult.textContent = '';
                converterForm.reset();
            });
            converterModal.addEventListener('click', function (e) {
                if (e.target === converterModal) {
                    converterModal.classList.remove('show');
                    converterResult.textContent = '';
                    converterForm.reset();
                }
            });

            // Simple conversion logic (approximate, for common baking measures)
            const conversionRates = {
                cups: { cups: 1, tablespoons: 16, teaspoons: 48, grams: 236.588, ounces: 8.3454, milliliters: 236.588 },
                tablespoons: { cups: 0.0625, tablespoons: 1, teaspoons: 3, grams: 14.787, ounces: 0.5216, milliliters: 14.787 },
                teaspoons: { cups: 0.0208, tablespoons: 0.3333, teaspoons: 1, grams: 4.929, ounces: 0.1736, milliliters: 4.929 },
                grams: { cups: 0.0042, tablespoons: 0.0676, teaspoons: 0.2029, grams: 1, ounces: 0.0353, milliliters: 1 },
                ounces: { cups: 0.12, tablespoons: 1.917, teaspoons: 5.75, grams: 28.3495, ounces: 1, milliliters: 28.3495 },
                milliliters: { cups: 0.0042, tablespoons: 0.0676, teaspoons: 0.2029, grams: 1, ounces: 0.0353, milliliters: 1 }
            };

            converterForm.addEventListener('submit', function (e) {
                e.preventDefault();
                const value = parseFloat(convertValue.value);
                const from = convertFrom.value;
                const to = convertTo.value;
                if (isNaN(value) || !conversionRates[from] || !conversionRates[from][to]) {
                    converterResult.textContent = 'Invalid conversion.';
                    return;
                }
                const result = value * conversionRates[from][to];
                converterResult.textContent = `${value} ${from} = ${result.toFixed(2)} ${to}`;
            });

            // Recipes and favorites logic
            // ...existing recipes/favorites code...
            // (Paste all recipes/favorites code here)
        });
    </script>
</body>

</html>
